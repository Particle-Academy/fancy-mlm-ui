name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: npm install

      - name: Build
        run: npm run build

      # BOOTSTRAP (first publish only): authenticate with a temporary NPM_TOKEN
      # secret — a brand-new package can't use OIDC until its Trusted Publisher
      # exists. After the first publish lands + the Trusted Publisher is added on
      # npmjs, revoke the token and delete the `env:` block below, leaving pure OIDC.
      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx -y npm@latest publish --provenance --access public
